name: crush_the_fq
description: "捏爆马虫 - 3D手势找不同 (WebView 离线版)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  # WebView —— 嵌套原 HTML 手势识别网页，全平台原生体验
  webview_flutter: ^4.10.0
  # 路径工具 —— 复制 asset 文件到临时目录
  path_provider: ^2.1.0
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  meta: ^1.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/web/
    - assets/web/mediapipe/hands/
