name: 🚀 全平台构建 & 自动发布

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.1"
  APP_NAME: "crush_the_fq"
  RELEASE_TITLE: 'Flutter 重构版 - 捏爆"马虫"'
  RELEASE_BODY: "使用 Flutter WebView 离线嵌套原 HTML 手势识别网页"

permissions:
  contents: write
  actions: read

jobs:
  # ============================
  # 1. Android APK
  # ============================
  build-android:
    name: 🤖 Android
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false
      - run: flutter pub get
      - run: |
          flutter build apk --release \
            --target-platform android-arm64,android-arm,android-x64 \
            --build-name=1.0.0 --build-number=${{ github.run_number }}
      - run: |
          mkdir -p build/outputs/artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/outputs/artifacts/${{ env.APP_NAME }}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/outputs/artifacts/*.apk
          retention-days: 30

  # ============================
  # 2. iOS
  # ============================
  build-ios:
    name: 🍎 iOS
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false
      - run: flutter pub get
      - run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=${{ github.run_number }}
      - run: |
          mkdir -p build/outputs/artifacts
          cd build/ios/iphoneos
          zip -r "../../outputs/artifacts/${{ env.APP_NAME }}-ios.zip" Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/outputs/artifacts/*.zip
          retention-days: 30

  # ============================
  # 3. macOS 桌面
  # ============================
  build-macos:
    name: 🍏 macOS
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false
      - run: flutter pub get
      - run: flutter build macos --release
      - run: |
          mkdir -p build/outputs/artifacts
          cd build/macos/Build/Products/Release
          zip -r "../../../../outputs/artifacts/${{ env.APP_NAME }}-macos.zip" *.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/outputs/artifacts/*.zip
          retention-days: 30

  # ============================
  # 4. 自动 Release
  # ============================
  create-release:
    name: 📦 Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: ios-app
          path: artifacts/ios
      - uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: artifacts/macos

      - id: tag
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ env.RELEASE_TITLE }} ${{ steps.tag.outputs.tag }}"
          body: |
            ${{ env.RELEASE_BODY }}

            | 平台 | 格式 | 说明 |
            |------|------|------|
            | 🤖 Android | .apk | 正式发行版 |
            | 🍎 iOS | .zip (.app) | 需签名后安装 |
            | 🍏 macOS | .zip (.app) | 桌面应用 |

            > 🪟 Windows 和 🌐 Web 使用根目录 `index.html`（浏览器即可运行）。
          files: |
            artifacts/android/*.apk
            artifacts/ios/*.zip
            artifacts/macos/*.zip
          generate_release_notes: true
