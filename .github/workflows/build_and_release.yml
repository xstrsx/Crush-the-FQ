# =============================================================================
# 捏爆"马虫" - Flutter 全平台自动构建 + GitHub Release 发布流水线
# =============================================================================
# 触发条件：向 main 分支推送代码或合并 PR 后自动触发
# 构建目标：Android / iOS / Windows / macOS / Linux / Web
# 产物处理：上传至工件 (Artifacts) → 自动创建 GitHub Release 并附加所有包
# =============================================================================

name: 🚀 全平台构建 & 自动发布

# ---------- 触发规则 ----------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # 允许手动触发（用于调试）
  workflow_dispatch:

# ---------- 全局环境变量 ----------
env:
  FLUTTER_VERSION: "3.32.7" # 使用当前最新稳定版
  APP_NAME: "crush_the_fq"
  RELEASE_TITLE: 'Flutter 重构版 - 捏爆"马虫"'
  RELEASE_BODY: "使用 Flutter 重构"

# ---------- 权限配置（确保 Release 创建和附件上传权限） ----------
permissions:
  contents: write      # 创建 Release + 上传附件
  actions: read        # 读取工作流状态
  pull-requests: read  # PR 读取

# =============================================================================
# 构建任务矩阵
# =============================================================================
jobs:
  # ============================
  # 1. Android APK 构建
  # ============================
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🔨 构建 Android APK (Release)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64,android-arm,android-x64 \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: 📋 重命名产物
        run: |
          mkdir -p build/outputs/artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/outputs/artifacts/${APP_NAME}-android-v1.0.0+${{ github.run_number }}.apk

      - name: 📤 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/outputs/artifacts/*.apk
          retention-days: 30

      - name: ✅ 输出构建信息
        run: |
          echo "✅ Android APK 构建完成"
          ls -lh build/outputs/artifacts/

  # ============================
  # 2. iOS 打包（macOS 运行器）
  # ============================
  build-ios:
    name: 🍎 iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🔨 构建 iOS (无签名 .app 包)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: 📦 打包为 .zip（模拟 .ipa 交付）
        run: |
          mkdir -p build/outputs/artifacts
          cd build/ios/iphoneos
          zip -r ../../outputs/artifacts/${APP_NAME}-ios-v1.0.0+${{ github.run_number }}.zip Runner.app
          cd ../../..

      - name: 📤 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/outputs/artifacts/*.zip
          retention-days: 30

      - name: ✅ 输出构建信息
        run: |
          echo "✅ iOS App 构建完成（未签名，需手动签名后安装）"
          ls -lh build/outputs/artifacts/

  # ============================
  # 3. Windows 桌面构建
  # ============================
  build-windows:
    name: 🪟 Windows 安装包
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🔨 构建 Windows (便携包 + MSIX)
        run: |
          flutter build windows --release

      - name: 📋 收集产物
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/outputs/artifacts

          # 便携包（直接运行的 .exe 所在目录）
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath build/outputs/artifacts/$env:APP_NAME-windows-portable-v1.0.0+${{ github.run_number }}.zip

        env:
          APP_NAME: ${{ env.APP_NAME }}

      - name: 📤 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/outputs/artifacts/*.zip
          retention-days: 30

      - name: ✅ 输出构建信息
        shell: pwsh
        run: |
          echo "✅ Windows 构建完成"
          Get-ChildItem build/outputs/artifacts/

  # ============================
  # 4. macOS 桌面构建
  # ============================
  build-macos:
    name: 🍏 macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🔨 构建 macOS
        run: |
          flutter build macos --release

      - name: 📋 创建 .app 压缩包
        run: |
          mkdir -p build/outputs/artifacts
          cd build/macos/Build/Products/Release
          zip -r ../../../../outputs/artifacts/${APP_NAME}-macos-v1.0.0+${{ github.run_number }}.zip *.app
          cd ../../../../..

      - name: 📤 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/outputs/artifacts/*.zip
          retention-days: 30

      - name: ✅ 输出构建信息
        run: |
          echo "✅ macOS 桌面构建完成"
          ls -lh build/outputs/artifacts/

  # ============================
  # 5. Linux 桌面构建
  # ============================
  build-linux:
    name: 🐧 Linux 安装包
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: 📦 安装 Linux 编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake clang pkg-config libgtk-3-dev \
            liblzma-dev ninja-build \
            libblkid-dev libmount-dev libselinux1-dev \
            libpcre2-dev zlib1g-dev

      - name: 📦 安装 Flutter 依赖
        run: flutter pub get

      - name: 🔨 构建 Linux (Release)
        run: |
          flutter build linux --release

      - name: 📋 创建便携包 .tar.gz
        run: |
          mkdir -p build/outputs/artifacts
          cd build/linux/x64/release
          tar -czf ../../../../outputs/artifacts/${APP_NAME}-linux-portable-v1.0.0+${{ github.run_number }}.tar.gz bundle/
          cd ../../../..

      - name: 📤 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: build/outputs/artifacts/*.tar.gz
          retention-days: 30

      - name: ✅ 输出构建信息
        run: |
          echo "✅ Linux 构建完成"
          ls -lh build/outputs/artifacts/

  # ============================
  # 6. Flutter Web 构建
  # ============================
  build-web:
    name: 🌐 Flutter Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: 📦 安装依赖
        run: flutter pub get

      - name: 🔨 构建 Web
        run: |
          flutter build web \
            --release \
            --base-href "/Crush-the-FQ/"

      - name: 📋 创建 Web 部署包
        run: |
          mkdir -p build/outputs/artifacts
          cd build/web
          zip -r ../outputs/artifacts/${APP_NAME}-web-v1.0.0+${{ github.run_number }}.zip .
          cd ../..

      - name: 📤 上传工件
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: build/outputs/artifacts/*.zip
          retention-days: 30

      - name: ✅ 输出构建信息
        run: |
          echo "✅ Flutter Web 构建完成"
          ls -lh build/outputs/artifacts/

  # ===========================================================================
  # 7. 自动发布 GitHub Release（仅 main 分支 push 触发）
  # ===========================================================================
  create-release:
    name: 📦 创建 GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
      - build-windows
      - build-macos
      - build-linux
      - build-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🗑️ 清理旧工件（同名）
        uses: actions/delete-artifacts@v1
        continue-on-error: true
        with:
          name: |
            android-apk
            ios-app
            windows-app
            macos-app
            linux-app
            web-app

      - name: ⬇️ 下载 Android 工件
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-artifacts/android

      - name: ⬇️ 下载 iOS 工件
        uses: actions/download-artifact@v4
        with:
          name: ios-app
          path: release-artifacts/ios

      - name: ⬇️ 下载 Windows 工件
        uses: actions/download-artifact@v4
        with:
          name: windows-app
          path: release-artifacts/windows

      - name: ⬇️ 下载 macOS 工件
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: release-artifacts/macos

      - name: ⬇️ 下载 Linux 工件
        uses: actions/download-artifact@v4
        with:
          name: linux-app
          path: release-artifacts/linux

      - name: ⬇️ 下载 Web 工件
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: release-artifacts/web

      - name: 📋 列出所有产物
        run: |
          echo "=== 所有构建产物 ==="
          find release-artifacts -type f -exec ls -lh {} \;

      - name: 🏷️ 生成版本标签
        id: tag
        run: |
          # 使用语义化版本 + GitHub Run Number 保证唯一
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release Tag: ${TAG}"

      - name: 🚀 创建 GitHub Release 并上传附件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ env.RELEASE_TITLE }} ${{ steps.tag.outputs.tag }}"
          body: |
            ${{ env.RELEASE_BODY }}

            ---

            ## 📦 包含的安装包

            | 平台 | 文件类型 | 说明 |
            |------|---------|------|
            | 🤖 Android | `.apk` | 正式发行版，可直接安装 |
            | 🍎 iOS | `.zip` (.app) | 需使用签名工具签署后安装 |
            | 🪟 Windows | `.zip` (便携包) | 解压即用 |
            | 🍏 macOS | `.zip` (.app) | macOS 桌面应用 |
            | 🐧 Linux | `.tar.gz` (便携包) | 解压即用 |
            | 🌐 Web | `.zip` | 静态部署包 |

            ## 🔧 构建信息
            - 构建编号: #${{ github.run_number }}
            - 提交哈希: ${{ github.sha }}
            - 构建时间: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          files: |
            release-artifacts/android/*.apk
            release-artifacts/ios/*.zip
            release-artifacts/windows/*.zip
            release-artifacts/macos/*.zip
            release-artifacts/linux/*.tar.gz
            release-artifacts/web/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: ✅ 发布完成
        run: |
          echo "============================================"
          echo "  🎉 Release ${{ steps.tag.outputs.tag }} 发布成功！"
          echo "  所有平台安装包已上传至 Release 附件区"
          echo "============================================"
